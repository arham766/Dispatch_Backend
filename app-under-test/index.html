<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShopDemo - Checkout</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f7;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .checkout-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 40px;
      width: 100%;
      max-width: 480px;
      margin: 20px;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 8px;
      color: #1d1d1f;
    }
    .subtitle {
      color: #86868b;
      font-size: 0.9rem;
      margin-bottom: 24px;
    }
    .order-summary {
      background: #f5f5f7;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 24px;
    }
    .order-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 0.95rem;
    }
    .order-total {
      border-top: 1px solid #d2d2d7;
      padding-top: 8px;
      font-weight: 600;
      font-size: 1.1rem;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: #1d1d1f;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid #d2d2d7;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.2s;
      outline: none;
    }
    input:focus {
      border-color: #0071e3;
      box-shadow: 0 0 0 3px rgba(0,113,227,0.1);
    }
    .row {
      display: flex;
      gap: 12px;
    }
    .row .form-group {
      flex: 1;
    }
    #pay-btn {
      width: 100%;
      padding: 14px;
      background: #0071e3;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }
    #pay-btn:hover { background: #0077ed; }
    #pay-btn:disabled {
      background: #86868b;
      cursor: not-allowed;
    }
    .error-message {
      background: #fef2f2;
      color: #dc2626;
      padding: 12px 16px;
      border-radius: 8px;
      margin-top: 16px;
      display: none;
      font-size: 0.9rem;
    }
    .success-message {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 8px;
      padding: 24px;
      text-align: center;
      display: none;
    }
    .success-message h2 {
      color: #16a34a;
      margin-bottom: 8px;
    }
    .order-number {
      font-family: monospace;
      font-size: 1.2rem;
      color: #1d1d1f;
      font-weight: 700;
    }
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="checkout-container">
  <!-- Checkout Form -->
  <div id="checkout-form">
    <h1>Checkout</h1>
    <p class="subtitle">Complete your purchase</p>

    <div class="order-summary">
      <div class="order-item">
        <span>Premium Widget x1</span>
        <span>$49.99</span>
      </div>
      <div class="order-item">
        <span>Shipping</span>
        <span>$4.99</span>
      </div>
      <div class="order-item order-total">
        <span>Total</span>
        <span>$54.98</span>
      </div>
    </div>

    <div class="form-group">
      <label for="card-number">Card Number</label>
      <input type="text" id="card-number" placeholder="4111 1111 1111 1111"
             maxlength="19" autocomplete="cc-number">
    </div>

    <div class="row">
      <div class="form-group">
        <label for="expiry">Expiry Date</label>
        <input type="text" id="expiry" placeholder="MM/YY" maxlength="5"
               autocomplete="cc-exp">
      </div>
      <div class="form-group">
        <label for="cvv">CVV</label>
        <input type="text" id="cvv" placeholder="123" maxlength="4"
               autocomplete="cc-csc">
      </div>
    </div>

    <div class="form-group">
      <label for="cardholder">Cardholder Name</label>
      <input type="text" id="cardholder" placeholder="John Doe"
             autocomplete="cc-name">
    </div>

    <button id="pay-btn" onclick="handlePay()">Pay $54.98</button>

    <div class="error-message" id="error-msg"></div>
  </div>

  <!-- Success State -->
  <div class="success-message" id="success-msg">
    <h2>Order Confirmed!</h2>
    <p>Your order number is:</p>
    <p class="order-number" id="order-number"></p>
    <p style="margin-top:12px;color:#86868b;font-size:0.85rem;">
      A confirmation email has been sent.
    </p>
  </div>
</div>

<script src="payment.js"></script>

</body>
</html>
