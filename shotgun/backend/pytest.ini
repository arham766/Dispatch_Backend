[pytest]
# Shotgun backend test configuration (new file — does not touch app code)
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra -q
filterwarnings =
    ignore::DeprecationWarning
markers =
    integration: end-to-end state-machine / loop tests
    stress: concurrency and load tests
    slow: tests that take more than ~1s
